<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#160d2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flip Spell">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Flip Spell</title>
  <style>
    :root{--bg:#0f0a1e;--panel:rgba(255,255,255,.09);--text:#faf4ff;--muted:#c9bce2;--gold:#f5c86a;--win:#6ee7b7;--loss:#fb7185;--shadow:0 18px 50px rgba(0,0,0,.42)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 8%,rgba(159,122,234,.38),transparent 32%),radial-gradient(circle at 84% 18%,rgba(245,200,106,.22),transparent 30%),var(--bg);color:var(--text);font-family:ui-rounded,"SF Pro Rounded","Avenir Next",system-ui,sans-serif}
    body{min-height:100svh;display:grid;place-items:center;padding:max(16px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom))}.app{width:min(100%,430px);display:flex;flex-direction:column;gap:13px}header{text-align:center}.eyebrow{color:var(--gold);letter-spacing:.15em;text-transform:uppercase;font-size:.7rem;font-weight:900}h1{margin:5px 0;font-size:clamp(2rem,10vw,3.2rem);line-height:1}.subtitle{margin:0;color:var(--muted);font-size:.92rem}
    .panel{background:linear-gradient(160deg,rgba(255,255,255,.13),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.16);border-radius:8px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}.scoreboard{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}.stat{background:rgba(0,0,0,.2);border-radius:7px;padding:10px;text-align:center}.label{display:block;color:var(--muted);font-size:.7rem;text-transform:uppercase;font-weight:900}.value{display:block;margin-top:3px;font-size:1.55rem;font-weight:950}
    .arena{min-height:480px;padding:16px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:space-between}.result{text-align:center;min-height:62px;z-index:3}.result-title{font-size:1.9rem;font-weight:950}.result-detail{color:var(--muted);margin:4px 0 0}.coin-wrap{width:190px;height:190px;display:grid;place-items:center;perspective:950px;z-index:2}.coin{width:174px;height:174px;border-radius:50%;position:relative;transform-style:preserve-3d;transition:transform 1.1s cubic-bezier(.15,.85,.2,1);filter:drop-shadow(0 22px 25px rgba(0,0,0,.45))}.coin-face{position:absolute;inset:0;border-radius:50%;display:grid;place-items:center;backface-visibility:hidden;border:8px solid #e9be55;box-shadow:inset 0 0 0 4px rgba(68,38,3,.45),inset 0 0 30px rgba(255,255,255,.3);overflow:hidden}.heads{background:linear-gradient(145deg,#ffe9a2,#c98a22 62%,#7a4807)}.tails{transform:rotateY(180deg);background:linear-gradient(145deg,#f5d984,#b77718 62%,#704006)}.coin-art{position:relative;z-index:1;text-align:center;color:#583006;text-shadow:0 1px rgba(255,255,255,.5)}.face-label{display:block;font-size:1rem;letter-spacing:.13em;font-weight:1000}.portrait{font-size:4.8rem;line-height:.9}.crest{font-size:4.5rem;line-height:.95}.coin-face:after{content:"";position:absolute;inset:18px;border:2px dotted rgba(86,48,4,.5);border-radius:50%}.coin.flipping{animation:bob 1.1s ease}.controls{width:100%;display:grid;gap:10px;z-index:5}.call-box{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:5px;background:rgba(0,0,0,.22);border-radius:8px}.toggle,.small-btn{border:1px solid rgba(255,255,255,.14);border-radius:6px;background:rgba(255,255,255,.08);color:var(--text);min-height:44px;font-weight:900}.toggle.active{color:#211107;background:linear-gradient(135deg,var(--gold),#fff0ad)}.flip-btn{border:0;border-radius:7px;min-height:64px;background:linear-gradient(135deg,#f5c86a,#f97316);color:#211107;font-size:1.22rem;font-weight:1000;box-shadow:0 13px 30px rgba(249,115,22,.28)}button{cursor:pointer}.flip-btn:active,.small-btn:active{transform:translateY(1px)}button:disabled{opacity:.7}.small-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cyclops-stage{position:absolute;inset:62px 0 auto;display:grid;place-items:center;z-index:4;pointer-events:none}.cyclops{display:none;position:relative;width:104px;height:112px;background:#74c69d;border:5px solid #183d32;border-radius:50% 50% 42% 42%;box-shadow:0 12px 24px rgba(0,0,0,.4)}.cyclops.show{display:block}.eye{position:absolute;width:46px;height:34px;left:24px;top:25px;background:#fff;border:4px solid #183d32;border-radius:50%}.pupil{position:absolute;width:14px;height:18px;left:12px;top:4px;background:#17221e;border-radius:50%}.mouth{position:absolute;left:30px;top:72px;width:35px;height:18px;border:4px solid #183d32;border-top:0;border-radius:0 0 24px 24px}.arm{position:absolute;top:62px;width:42px;height:13px;background:#74c69d;border:4px solid #183d32;border-radius:10px;transform-origin:center}.arm.left{left:-32px}.arm.right{right:-32px}.cyclops.happy{animation:happyPop 1.05s ease both}.cyclops.happy .arm.left{transform:rotate(-48deg)}.cyclops.happy .arm.right{transform:rotate(48deg)}.cyclops.happy:after{content:"★";position:absolute;right:-23px;top:-18px;color:#ffe66d;font-size:29px;animation:spark .5s ease infinite alternate}.cyclops.sad{animation:sadDrop 1.15s ease both;background:#6ca0a3}.cyclops.sad .mouth{border-top:4px solid #183d32;border-bottom:0;border-radius:24px 24px 0 0;top:80px}.cyclops.sad .arm.left{transform:rotate(32deg)}.cyclops.sad .arm.right{transform:rotate(-32deg)}.cyclops.sad .eye:after{content:"";position:absolute;width:9px;height:18px;background:#69c8ff;border-radius:50% 50% 60% 60%;right:2px;top:27px;animation:tear .8s ease .15s both}
    .settings{padding:13px}.settings summary{cursor:pointer;color:var(--muted);font-weight:850}.settings label{display:grid;gap:5px;margin-top:10px;color:var(--muted);font-size:.85rem;font-weight:800}.settings input[type=text]{border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.22);color:var(--text);border-radius:6px;padding:11px;font-size:1rem}.check-row{display:flex!important;align-items:center;gap:8px}.footer{text-align:center;color:rgba(248,241,255,.5);font-size:.72rem}.particle{position:absolute;left:50%;top:44%;width:9px;height:9px;border-radius:50%;background:var(--gold);animation:blast .85s ease-out forwards;z-index:2}
    @keyframes bob{35%{translate:0 -18px}}@keyframes happyPop{0%{opacity:0;transform:translateY(25px) scale(.5)}25%,70%{opacity:1;transform:translateY(0) scale(1.08) rotate(-4deg)}48%{transform:translateY(-12px) scale(1) rotate(4deg)}100%{opacity:0;transform:translateY(-16px) scale(.85)}}@keyframes sadDrop{0%{opacity:0;transform:translateY(-12px) scale(.7)}20%,75%{opacity:1;transform:translateY(0) scale(1)}45%{transform:translateY(8px) rotate(-3deg)}100%{opacity:0;transform:translateY(18px) scale(.9)}}@keyframes spark{to{transform:scale(1.3) rotate(22deg)}}@keyframes tear{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(15px)}}@keyframes blast{to{transform:translate(var(--x),var(--y)) rotate(var(--r));opacity:0}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
<main class="app"><header><div class="eyebrow">Arcane Coin Utility</div><h1>Flip Spell</h1><p class="subtitle">Coin Flip Deck: call it, flip it, track the chaos.</p></header>
<section class="scoreboard panel"><div class="stat"><span class="label">Wins</span><span class="value" id="wins">0</span></div><div class="stat"><span class="label">Losses</span><span class="value" id="losses">0</span></div><div class="stat"><span class="label">Rate</span><span class="value" id="rate">—</span></div></section>
<section class="arena panel" id="arena"><div class="result" aria-live="polite"><div class="result-title" id="resultTitle">Ready?</div><p class="result-detail" id="resultDetail">Choose a side and tempt fate.</p></div><div class="cyclops-stage"><div class="cyclops" id="cyclops"><span class="arm left"></span><span class="arm right"></span><span class="eye"><span class="pupil"></span></span><span class="mouth"></span></div></div>
<div class="coin-wrap" aria-hidden="true"><div class="coin" id="coin"><div class="coin-face heads"><div class="coin-art"><span class="portrait">👤</span><span class="face-label">HEADS</span></div></div><div class="coin-face tails"><div class="coin-art"><span class="crest">🦅</span><span class="face-label">TAILS</span></div></div></div></div>
<div class="controls"><div class="call-box"><button class="toggle active" id="callHeads">Call Heads</button><button class="toggle" id="callTails">Call Tails</button></div><button class="flip-btn" id="flipBtn">Flip for Riches and Glory!</button><div class="small-actions"><button class="small-btn" id="undoBtn">Undo Last</button><button class="small-btn" id="resetBtn">Reset Score</button></div></div></section>
<details class="settings panel"><summary>Customize</summary><label>Win phrase<input id="winPhrase" type="text" maxlength="32" value="The spell resolves!"></label><label>Loss phrase<input id="lossPhrase" type="text" maxlength="32" value="Mana fizzles..."></label><label>Deck name<input id="deckName" type="text" maxlength="28" value="Coin Flip Deck"></label><label class="check-row"><input id="soundToggle" type="checkbox" checked> Sound effects</label></details><div class="footer">Personal fan utility. No official logos, art, or trademarks included.</div></main>
<script>
const $=id=>document.getElementById(id),key="flip-spell-state-v2";const state={wins:0,losses:0,call:"heads",last:null,turns:0,winPhrase:"The spell resolves!",lossPhrase:"Mana fizzles...",deckName:"Coin Flip Deck",sound:true};
function save(){localStorage.setItem(key,JSON.stringify(state))}function update(){wins.textContent=state.wins;losses.textContent=state.losses;const n=state.wins+state.losses;rate.textContent=n?Math.round(state.wins/n*100)+"%":"—"}function setCall(s){state.call=s;callHeads.classList.toggle("active",s==="heads");callTails.classList.toggle("active",s==="tails");save()}function tone(win){if(!state.sound)return;try{const C=window.AudioContext||window.webkitAudioContext,c=new C,o=c.createOscillator(),g=c.createGain(),n=c.currentTime;o.type="triangle";o.frequency.setValueAtTime(win?523:220,n);o.frequency.exponentialRampToValueAtTime(win?1046:147,n+.3);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.0001,n+.42);o.connect(g).connect(c.destination);o.start();o.stop(n+.44)}catch{}}
function react(win){cyclops.className="cyclops show "+(win?"happy":"sad");void cyclops.offsetWidth;setTimeout(()=>cyclops.className="cyclops",1200);if(win)for(let i=0;i<28;i++){const p=document.createElement("i"),a=Math.PI*2*i/28,d=70+Math.random()*100;p.className="particle";p.style.setProperty("--x",Math.cos(a)*d+"px");p.style.setProperty("--y",Math.sin(a)*d+"px");p.style.setProperty("--r",Math.random()*500+"deg");arena.appendChild(p);setTimeout(()=>p.remove(),900)}}
function flip(){flipBtn.disabled=true;const result=Math.random()<.5?"heads":"tails",won=result===state.call;state.turns+=5+Math.floor(Math.random()*3);coin.classList.add("flipping");coin.style.transform=`rotateY(${state.turns*360+(result==="tails"?180:0)}deg)`;resultTitle.textContent="Flipping...";resultDetail.textContent=`You called ${state.call}.`;setTimeout(()=>{coin.classList.remove("flipping");won?state.wins++:state.losses++;state.last=won?"win":"loss";resultTitle.textContent=won?"WIN":"LOSS";resultDetail.textContent=`${won?state.winPhrase:state.lossPhrase} Result: ${result}.`;update();save();react(won);tone(won);if(navigator.vibrate)navigator.vibrate(won?[25,30,25]:60);flipBtn.disabled=false},1120)}
function load(){try{Object.assign(state,JSON.parse(localStorage.getItem(key))||{})}catch{}winPhrase.value=state.winPhrase;lossPhrase.value=state.lossPhrase;deckName.value=state.deckName;soundToggle.checked=state.sound;document.querySelector(".subtitle").textContent=`${state.deckName}: call it, flip it, track the chaos.`;update();setCall(state.call)}
callHeads.onclick=()=>setCall("heads");callTails.onclick=()=>setCall("tails");flipBtn.onclick=flip;undoBtn.onclick=()=>{if(!state.last)return;if(state.last==="win")state.wins--;else state.losses--;state.last=null;resultTitle.textContent="Undone";resultDetail.textContent="The timeline has been corrected.";update();save()};resetBtn.onclick=()=>{if(confirm("Reset wins and losses?")){state.wins=state.losses=0;state.last=null;update();save()}};winPhrase.oninput=e=>{state.winPhrase=e.target.value||"The spell resolves!";save()};lossPhrase.oninput=e=>{state.lossPhrase=e.target.value||"Mana fizzles...";save()};deckName.oninput=e=>{state.deckName=e.target.value||"Coin Flip Deck";document.querySelector(".subtitle").textContent=`${state.deckName}: call it, flip it, track the chaos.`;save()};soundToggle.onchange=e=>{state.sound=e.target.checked;save()};if("serviceWorker"in navigator)addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js"));load();
</script></body></html>
