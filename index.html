<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#160d2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flip Spell" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Flip Spell</title>
  <style>
    :root {
      --bg: #0f0a1e;
      --panel: rgba(255,255,255,0.08);
      --panel-strong: rgba(255,255,255,0.14);
      --text: #f8f1ff;
      --muted: #c9bce2;
      --gold: #f5c86a;
      --violet: #9f7aea;
      --blue: #60a5fa;
      --win: #6ee7b7;
      --loss: #fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,0.42);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 18% 8%, rgba(159,122,234,0.45), transparent 32%),
        radial-gradient(circle at 84% 18%, rgba(245,200,106,0.25), transparent 30%),
        radial-gradient(circle at 52% 88%, rgba(96,165,250,0.22), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
    }

    .app {
      width: min(100%, 430px);
      min-height: calc(100svh - 32px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }

    header {
      text-align: center;
      padding: 10px 8px 0;
    }

    .eyebrow {
      color: var(--gold);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 800;
    }

    h1 {
      margin: 6px 0 6px;
      font-size: clamp(2rem, 10vw, 3.3rem);
      line-height: 0.95;
      text-shadow: 0 0 22px rgba(245,200,106,0.22);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      background: linear-gradient(160deg, rgba(255,255,255,0.13), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px;
    }

    .stat {
      background: rgba(0,0,0,0.18);
      border-radius: 18px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat .label {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }

    .stat .value {
      display: block;
      margin-top: 4px;
      font-size: 1.6rem;
      font-weight: 900;
    }

    .arena {
      flex: 1;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .sigil {
      position: absolute;
      inset: auto 0 42%;
      margin: auto;
      width: 290px;
      height: 290px;
      border-radius: 50%;
      border: 1px solid rgba(245,200,106,0.15);
      opacity: 0.45;
      transform: rotate(18deg);
      pointer-events: none;
    }

    .sigil::before,
    .sigil::after {
      content: "";
      position: absolute;
      inset: 30px;
      border: 1px solid rgba(159,122,234,0.35);
      border-radius: 32%;
      transform: rotate(45deg);
    }

    .sigil::after {
      inset: 70px;
      border-radius: 50%;
      border-color: rgba(96,165,250,0.35);
      transform: rotate(0deg);
    }

    .result {
      min-height: 74px;
      text-align: center;
      z-index: 2;
    }

    .result-title {
      font-size: 2.05rem;
      font-weight: 950;
      line-height: 1;
      margin: 8px 0 6px;
    }

    .result-detail {
      color: var(--muted);
      font-size: 1rem;
      margin: 0;
    }

    .coin-wrap {
      width: 210px;
      height: 210px;
      display: grid;
      place-items: center;
      perspective: 950px;
      z-index: 2;
      margin: 10px 0;
    }

    .coin {
      width: 188px;
      height: 188px;
      border-radius: 50%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.1s cubic-bezier(.15,.85,.2,1);
      filter: drop-shadow(0 24px 28px rgba(0,0,0,0.42));
    }

    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      backface-visibility: hidden;
      border: 8px solid rgba(255,255,255,0.22);
      box-shadow:
        inset 0 0 0 4px rgba(0,0,0,0.23),
        inset 0 0 38px rgba(255,255,255,0.24),
        0 0 38px rgba(245,200,106,0.20);
      overflow: hidden;
    }

    .coin-face::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 2px dashed rgba(255,255,255,0.34);
      border-radius: 50%;
    }

    .coin-face::after {
      content: "";
      position: absolute;
      width: 66px;
      height: 210px;
      transform: rotate(25deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      animation: shimmer 3.2s linear infinite;
    }

    .heads {
      background:
        radial-gradient(circle at 30% 22%, #fff6bd, transparent 17%),
        linear-gradient(145deg, #f8d46f, #b7791f 58%, #7c4a03);
    }

    .tails {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 68% 28%, #dbeafe, transparent 18%),
        linear-gradient(145deg, #93c5fd, #6d28d9 55%, #28104f);
    }

    .symbol {
      font-size: 4.3rem;
      z-index: 1;
      text-shadow: 0 3px 6px rgba(0,0,0,0.32);
    }

    @keyframes shimmer {
      from { left: -120px; }
      to { left: 230px; }
    }

    .coin.flipping {
      animation: bob 1.1s cubic-bezier(.15,.85,.2,1);
    }

    @keyframes bob {
      0% { translate: 0 0; }
      35% { translate: 0 -20px; }
      100% { translate: 0 0; }
    }

    .controls {
      z-index: 2;
      width: 100%;
      display: grid;
      gap: 12px;
    }

    .call-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 6px;
      background: rgba(0,0,0,0.2);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .toggle {
      border: 0;
      border-radius: 14px;
      padding: 13px 10px;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
      font-size: 0.98rem;
      cursor: pointer;
    }

    .toggle.active {
      color: #1a1127;
      background: linear-gradient(135deg, var(--gold), #fff0ad);
      box-shadow: 0 8px 18px rgba(245,200,106,0.2);
    }

    .flip-btn {
      width: 100%;
      min-height: 66px;
      border: 0;
      border-radius: 22px;
      background: linear-gradient(135deg, #f5c86a, #f97316);
      color: #211107;
      font-size: 1.35rem;
      font-weight: 950;
      box-shadow: 0 14px 34px rgba(249,115,22,0.28);
      cursor: pointer;
    }

    .flip-btn:active { transform: translateY(1px) scale(0.995); }
    .flip-btn:disabled { opacity: 0.72; cursor: wait; }

    .small-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .small-btn {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 17px;
      background: rgba(255,255,255,0.09);
      color: var(--text);
      min-height: 46px;
      font-weight: 850;
      cursor: pointer;
    }

    .small-btn:active { transform: translateY(1px); }

    .settings {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .settings summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 850;
      user-select: none;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 750;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.22);
      color: var(--text);
      border-radius: 15px;
      padding: 12px 13px;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(245,200,106,0.72);
      box-shadow: 0 0 0 3px rgba(245,200,106,0.16);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 750;
      font-size: 0.92rem;
    }

    .check-row input { width: 20px; height: 20px; accent-color: #f5c86a; }

    .footer {
      color: rgba(248,241,255,0.5);
      text-align: center;
      font-size: 0.76rem;
      padding: 4px 10px 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      translate: -50% 16px;
      opacity: 0;
      pointer-events: none;
      padding: 12px 14px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      border-radius: 999px;
      font-weight: 850;
      z-index: 50;
      transition: 220ms ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .toast.show {
      translate: -50% 0;
      opacity: 1;
    }

    .burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 46%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      animation: blast 900ms ease-out forwards;
      box-shadow: 0 0 18px currentColor;
    }

    .loss-particle {
      border-radius: 2px;
      background: var(--loss);
    }

    @keyframes blast {
      from { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      to {
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          rotate(var(--r))
          scale(0.1);
        opacity: 0;
      }
    }

    .win-glow {
      animation: winGlow 900ms ease-out;
    }

    .loss-glow {
      animation: lossGlow 900ms ease-out;
    }

    @keyframes winGlow {
      0% { box-shadow: var(--shadow), 0 0 0 rgba(110,231,183,0); }
      35% { box-shadow: var(--shadow), 0 0 70px rgba(110,231,183,0.44); }
      100% { box-shadow: var(--shadow), 0 0 0 rgba(110,231,183,0); }
    }

    @keyframes lossGlow {
      0% { box-shadow: var(--shadow), 0 0 0 rgba(251,113,133,0); }
      35% { box-shadow: var(--shadow), 0 0 70px rgba(251,113,133,0.35); }
      100% { box-shadow: var(--shadow), 0 0 0 rgba(251,113,133,0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .coin, .coin.flipping, .particle, .coin-face::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="eyebrow">Arcane Coin Utility</div>
      <h1>Flip Spell</h1>
      <p class="subtitle">Call it, flip it, track the chaos.</p>
    </header>

    <section class="scoreboard panel" aria-label="Scoreboard">
      <div class="stat">
        <span class="label">Wins</span>
        <span class="value" id="wins">0</span>
      </div>
      <div class="stat">
        <span class="label">Losses</span>
        <span class="value" id="losses">0</span>
      </div>
      <div class="stat">
        <span class="label">Rate</span>
        <span class="value" id="rate">—</span>
      </div>
    </section>

    <section class="arena panel" id="arena">
      <div class="sigil"></div>
      <div class="burst" id="burst"></div>

      <div class="result" aria-live="polite">
        <div class="result-title" id="resultTitle">Ready?</div>
        <p class="result-detail" id="resultDetail">Choose a side and tempt fate.</p>
      </div>

      <div class="coin-wrap" aria-hidden="true">
        <div class="coin" id="coin">
          <div class="coin-face heads"><div class="symbol">☀</div></div>
          <div class="coin-face tails"><div class="symbol">☾</div></div>
        </div>
      </div>

      <div class="controls">
        <div class="call-box" role="group" aria-label="Choose your call">
          <button class="toggle active" id="callHeads" type="button">Call Sun</button>
          <button class="toggle" id="callTails" type="button">Call Moon</button>
        </div>
        <button class="flip-btn" id="flipBtn" type="button">Cast the Flip</button>
        <div class="small-actions">
          <button class="small-btn" id="undoBtn" type="button">Undo Last</button>
          <button class="small-btn" id="resetBtn" type="button">Reset Score</button>
        </div>
      </div>
    </section>

    <details class="settings panel">
      <summary>Customize</summary>
      <label>
        Win phrase
        <input id="winPhrase" type="text" maxlength="32" value="The spell resolves!" />
      </label>
      <label>
        Loss phrase
        <input id="lossPhrase" type="text" maxlength="32" value="Mana fizzles..." />
      </label>
      <label>
        Deck name
        <input id="deckName" type="text" maxlength="28" value="Coin Flip Deck" />
      </label>
      <label class="check-row">
        <input id="soundToggle" type="checkbox" checked />
        Sound effects
      </label>
    </details>

    <div class="footer">Personal fan utility. No official logos, art, or trademarks included.</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);

    const state = {
      wins: 0,
      losses: 0,
      call: "heads",
      last: null,
      flips: 0,
      winPhrase: "The spell resolves!",
      lossPhrase: "Mana fizzles...",
      deckName: "Coin Flip Deck",
      sound: true
    };

    const storeKey = "flip-spell-state-v1";

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(storeKey));
        if (saved) Object.assign(state, saved);
      } catch {}
      $("winPhrase").value = state.winPhrase;
      $("lossPhrase").value = state.lossPhrase;
      $("deckName").value = state.deckName;
      $("soundToggle").checked = state.sound;
      document.querySelector(".subtitle").textContent = `${state.deckName}: call it, flip it, track the chaos.`;
      updateUI();
      setCall(state.call);
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function updateUI() {
      $("wins").textContent = state.wins;
      $("losses").textContent = state.losses;
      const total = state.wins + state.losses;
      $("rate").textContent = total ? `${Math.round((state.wins / total) * 100)}%` : "—";
    }

    function setCall(side) {
      state.call = side;
      $("callHeads").classList.toggle("active", side === "heads");
      $("callTails").classList.toggle("active", side === "tails");
      save();
    }

    function playTone(kind) {
      if (!state.sound) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        const gain = ctx.createGain();
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);

        const osc = ctx.createOscillator();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(kind === "win" ? 523.25 : 220, now);
        osc.frequency.exponentialRampToValueAtTime(kind === "win" ? 1046.5 : 146.83, now + 0.28);
        osc.connect(gain);
        osc.start(now);
        osc.stop(now + 0.45);
      } catch {}
    }

    function toast(message) {
      const t = $("toast");
      t.textContent = message;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1400);
    }

    function particles(kind) {
      const burst = $("burst");
      burst.innerHTML = "";
      const count = kind === "win" ? 42 : 28;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("span");
        p.className = `particle ${kind === "loss" ? "loss-particle" : ""}`;
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const distance = 80 + Math.random() * 150;
        p.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
        p.style.setProperty("--y", `${Math.sin(angle) * distance}px`);
        p.style.setProperty("--r", `${Math.random() * 720}deg`);
        p.style.width = `${6 + Math.random() * 10}px`;
        p.style.height = `${6 + Math.random() * 10}px`;
        p.style.color = kind === "win" ? "#f5c86a" : "#fb7185";
        p.style.animationDelay = `${Math.random() * 90}ms`;
        burst.appendChild(p);
      }
      setTimeout(() => burst.innerHTML = "", 1100);
    }

    function setResultTitle(title, detail) {
      $("resultTitle").textContent = title;
      $("resultDetail").textContent = detail;
    }

    function flip() {
      const btn = $("flipBtn");
      btn.disabled = true;

      const result = Math.random() < 0.5 ? "heads" : "tails";
      const resultLabel = result === "heads" ? "Sun" : "Moon";
      const callLabel = state.call === "heads" ? "Sun" : "Moon";
      const won = result === state.call;

      state.flips += 1;
      const fullTurns = 4 + Math.floor(Math.random() * 3);
      const finalY = result === "heads" ? 0 : 180;
      const coin = $("coin");
      coin.classList.add("flipping");
      coin.style.transform = `rotateY(${fullTurns * 360 + finalY}deg)`;

      setResultTitle("Flipping...", `You called ${callLabel}.`);

      setTimeout(() => {
        coin.classList.remove("flipping");

        if (won) {
          state.wins += 1;
          state.last = "win";
          setResultTitle("WIN", `${state.winPhrase} Result: ${resultLabel}.`);
          $("arena").classList.remove("loss-glow");
          $("arena").classList.add("win-glow");
          particles("win");
          playTone("win");
          if (navigator.vibrate) navigator.vibrate([25, 30, 25]);
        } else {
          state.losses += 1;
          state.last = "loss";
          setResultTitle("LOSS", `${state.lossPhrase} Result: ${resultLabel}.`);
          $("arena").classList.remove("win-glow");
          $("arena").classList.add("loss-glow");
          particles("loss");
          playTone("loss");
          if (navigator.vibrate) navigator.vibrate(60);
        }

        updateUI();
        save();
        btn.disabled = false;
        setTimeout(() => $("arena").classList.remove("win-glow", "loss-glow"), 950);
      }, 1120);
    }

    function undo() {
      if (!state.last) {
        toast("No flip to undo.");
        return;
      }
      if (state.last === "win" && state.wins > 0) state.wins -= 1;
      if (state.last === "loss" && state.losses > 0) state.losses -= 1;
      state.last = null;
      setResultTitle("Undone", "The timeline has been corrected.");
      updateUI();
      save();
    }

    function reset() {
      const ok = confirm("Reset wins and losses?");
      if (!ok) return;
      state.wins = 0;
      state.losses = 0;
      state.last = null;
      setResultTitle("Ready?", "Choose a side and tempt fate.");
      updateUI();
      save();
    }

    $("callHeads").addEventListener("click", () => setCall("heads"));
    $("callTails").addEventListener("click", () => setCall("tails"));
    $("flipBtn").addEventListener("click", flip);
    $("undoBtn").addEventListener("click", undo);
    $("resetBtn").addEventListener("click", reset);

    $("winPhrase").addEventListener("input", (e) => {
      state.winPhrase = e.target.value || "The spell resolves!";
      save();
    });

    $("lossPhrase").addEventListener("input", (e) => {
      state.lossPhrase = e.target.value || "Mana fizzles...";
      save();
    });

    $("deckName").addEventListener("input", (e) => {
      state.deckName = e.target.value || "Coin Flip Deck";
      document.querySelector(".subtitle").textContent = `${state.deckName}: call it, flip it, track the chaos.`;
      save();
    });

    $("soundToggle").addEventListener("change", (e) => {
      state.sound = e.target.checked;
      save();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    load();
  </script>
</body>
</html>
